name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "develop" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install Poetry
      run: |
        pip install poetry
        poetry lock
        poetry install
    - name: Lint with Black and Flake8
      run: |
        poetry run black --check bamboo tests
        poetry run flake8 bamboo tests --count --select=E9,F63,F7,F82 --show-source --statistics
        poetry run flake8 bamboo tests --count --exit-zero --statistics
    - name: Test with Pytest
      run: |
        poetry run pytest .
    - name: Build package
      run: |
        poetry build
        pip install ./dist/bamboo-0.0.1.tar.gz
